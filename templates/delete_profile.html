<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>
        Hospital Management System
    </title>
    <style>

    body {
    background-image: url('/static/img.jpg');
    background-size: cover;       
    background-position: center;  
    background-repeat: no-repeat; 
  }
  </style>
</head>
<body >
    <div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary" style="background-color: black;">
        <div class="container-md">
        <a class="navbar-brand" style="color: whitesmoke;" href="#">Hospital Management System</a>
        </div>
        </nav>
    </div>
    <dialog id="successmodal" open style="
                position: fixed;
                top: 50%;
                left: 20%;
                transform: translate(-50%, -50%);
                border-radius: 15px;
                padding: 20px;
                border: 1px solid #ccc;
                background-color: #f9f9f9;">
        {%if role=='Appointment'%}
        <form action="{{ url_for('delete_profile',Pid=data[0],role='Appointment') }}" method="POST">
        <h2><b>Are you sure?Delete {{data[1]}}'s {{role}} .</b></h2><br>
        <button  class="btn btn-outline-danger" type="submit" >Yes</button>
        </form>
        {%else%}
        <form action="{{ url_for('delete_profile',role=role,Pid=data[0]) }}" method="POST">
        <h2><b>Are you sure?Delete {{data[1]}}'s {{role}} .</b></h2><br>
        <button  class="btn btn-outline-danger" type="submit" >Yes</button>
        </form>
        {%endif%}
        <a href="{{url_for('admin_panel')}}" class="btn btn-info">No</a>
    </dialog>
    
</body>
</html>
