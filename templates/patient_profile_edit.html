<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

        <title>
            Edit Patient Profile
        </title>
        <style>
                body {
                background-image: url('/static/img.jpg');
                background-size: cover;       
                background-position: center;  
                background-repeat: no-repeat; 
                }
            .rounded-container {
                position: fixed;
                top: 8vh;
                left: 2vw;
                right: 2vw;
                bottom: 2vh;
                background-color: #f8f9fa; 
                border-radius: 16px;       
                box-shadow: 0 0 10px rgba(0,0,0,0.1); 
                padding: 20px;
                overflow: auto;            
                z-index: 1000;
            }
            .rounded-dialog {
                position: fixed;
                top: 25vh;
                left: 3vw;
                right: 3vw;
                bottom: 4vh;
                background-color: teal; 
                border-radius: 16px;       
                box-shadow: 0 0 10px rgba(0,0,0,0.1); 
                padding: 20px;
                overflow: auto;            
                z-index: 1000;
            }
  </style>
    </head>
    <body>
        <div>
            <nav class="navbar navbar-expand-lg bg-body-tertiary" style="background-color: black;">
            <div class="container-md">
            <a class="navbar-brand" style="color: whitesmoke;" href="#">Hospital Management System</a>
            <a class="btn btn-danger" href="/logout"><U>Logout</U></a>
            </div>
            </nav>
        </div>
        <div class="rounded-container" >
                <ul class="nav nav-pills nav-fill">
                <li class="nav-item">
                    <a class="nav-link" href="/patient">Book Appointment</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/patient/history">Appointment History</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/patient/profile">Patient Profile</a>
                </li>
                </ul>
                <hr>
                <div class="rounded-dialog">
                    <h3>Edit Patient Profile</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ patient[1] }}">
                        </div>
                        <div class="mb-3">
                            <label for="DOB" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="DOB" name="DOB" value="{{ patient[2] }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="gender" class="form-label">Gender</label>
                            <input type="text" class="form-control" id="gender" name="gender" value="{{ patient[8] }}">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ patient[3] }}">
                        </div>
                        <div class="mb-3">
                            <label for="number" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="number" name="number" value="{{ patient[4] }}">
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ patient[5] }}">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" value="{{ patient[6] }}">
                        </div>
                        <div class="mb-3">
                            <label for="city" class="form-label">City</label>
                            <input type="text" class="form-control" id="city" name="city" value="{{ patient[9] }}">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div> 
        </div>
    </body>
</html>
