<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

        <title>
            Hospital Management System (Doctor profile)
        </title>
        <style>
                body {
                background-image: url('/static/img.jpg');
                background-size: cover;       
                background-position: center;  
                background-repeat: no-repeat; 
                }
            .button-container {
            display: flex;
            justify-content: center; 
            align-items: center;     
            height: 100px;           
            }
            .rounded-container {
                position: fixed;
                top: 8vh;
                left: 2vw;
                right: 2vw;
                bottom: 2vh;
                background-color: #f8f9fa; 
                border-radius: 16px;       
                box-shadow: 0 0 10px rgba(0,0,0,0.1); 
                padding: 20px;
                overflow: auto;            
                z-index: 1000;
            }
            .rounded-dialog {
                position: fixed;
                top: 25vh;
                left: 3vw;
                right: 3vw;
                bottom: 4vh;
                background-color: teal; 
                border-radius: 16px;       
                box-shadow: 0 0 10px rgba(0,0,0,0.1); 
                padding: 20px;
                overflow: auto;            
                z-index: 1000;
            }
  </style>
    </head>
    <body>
        <div>
            <nav class="navbar navbar-expand-lg bg-body-tertiary" style="background-color: black;">
            <div class="container-md">
            <a class="navbar-brand" style="color: whitesmoke;" href="#">Hospital Management System</a>
            <a class="btn btn-danger" href="/logout"><U>Logout</U></a>
            </div>
            </nav>
        </div>
        <div class="rounded-container" >
                <ul class="nav nav-pills nav-fill">
                <li class="nav-item">
                    <a class="nav-link disabled" aria-current="page" href="/doctor">Appointments</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link disabled" aria-current="page" href="/history">History</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/profile">DOCTOR</a>
                </li>
                </ul>
                <hr>
                <div class="rounded-dialog">
                        <div class="card w-85 mb-3" style="border-radius: 16px;">
                        <div class="card-body">
                            <h3 class="card-title">Doctor Profile</h3>
                            <form method="POST">
                                <div class="mb-3">
                                    <label for="specifications" class="form-label">Enter your specifications to complete your profile:</label>
                                    <textarea class="form-control" id="specifications" name="specifications" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="timing" class="form-label">Available Timing:</label><br>
                                    <a><b>From:</b></a>
                                    <input type="time" class="form-control" id="timing" name="timing" required>
                                    <a><b>To:</b></a>
                                    <input type="time" class="form-control" id="timing2" name="timing2" required>
                                </div>
                                <select class="form-select" id="hospital" name="hospital" required>
                                <option value="">Select hospital</option>
                                {% for hospital in data %}
                                <option value="{{ hospital[0] }}">{{ hospital[0] }}</option>
                                {% endfor %}
                                </select><br>

                                <button type="submit" class="btn btn-primary">Submit</button>
                            </form>
                        </div>
                        </div>
                            {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %} 
                </div> 
   
        </div>

    </body>
</html>
